services:
  - type: web
    name: oficina-mecanica-fastapi
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /auth/login
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: SECRET_KEY
        generateValue: true
      - key: SHOW_DEFAULT_ADMIN_HINT
        value: "false"
      - key: DEFAULT_ADMIN_NAME
        value: Administrador
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
