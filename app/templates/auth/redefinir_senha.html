<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Oficina Mecânica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4">Redefinir Senha</h4>

                    {% if success %}
                    <div class="alert alert-success">{{ success }}</div>
                    {% endif %}

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    {% if token %}
                    <form method="post" action="/auth/redefinir-senha">
                        <input type="hidden" name="token" value="{{ token }}">

                        <div class="mb-3">
                            <label class="form-label">Nova senha</label>
                            <input type="password" name="senha" class="form-control" minlength="6" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirmar nova senha</label>
                            <input type="password" name="confirmar_senha" class="form-control" minlength="6" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Salvar nova senha</button>
                    </form>
                    {% endif %}

                    <div class="text-center mt-3">
                        <a href="/auth/login">Voltar ao login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
